<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <!-- Preload critical above-the-fold assets -->
    <link rel="preload" as="image" href="/src/assets/peak-hero-product.png" />
    <link rel="preload" as="image" href="/src/assets/logo-peak.png" />

    <!-- Google Fonts: Inter with font-display swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />

    <!-- DNS prefetch for lazy-loaded video CDN -->
    <link rel="dns-prefetch" href="https://wnfypheskgiavkoprtvf.supabase.co" />
    <link rel="preconnect" href="https://wnfypheskgiavkoprtvf.supabase.co" />

    <!-- Critical CSS: prevent FOUC for splash screen -->
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
      body { background-color: hsl(0 0% 3.9%); }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>PEAK</title>
    <meta name="description" content="PEAK - Don't just watch the fight. Read it." />
    <meta name="author" content="PEAK" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="PEAK" />
    <meta property="og:description" content="Don't just watch the fight. Read it." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PEAK" />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>

  </body>
